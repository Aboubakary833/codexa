name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write
    id-token: write
    packages: write
    attestations: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: goreleaser/goreleaser-action@v4
              with:
                  version: latest
                  args: release --clean
              env:
                  GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
